services:
  homedash:
    build:
      context: .
      dockerfile: dockerfile
    container_name: homedash
    ports:
      - "${HOMEDASH_PORT:-5000}:5000"
    volumes:
      # Монтируем конфиг с хоста (hot-reload через fsnotify)
      # Примечание: на Windows с Docker Desktop fsnotify может не работать
      # с bind mount из-за различий файловых систем.
      # Решение: использовать Docker с WSL2 backend или скопировать конфиг в image.
      - ./config.json:/app/config.json:ro
    environment:
      - PORT=5000
      - CHECK_TIMEOUT=2s
      - PING_TIMEOUT=1s
      - TZ=${TZ:-Europe/Moscow}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - IP_PROVIDERS=https://api.ipify.org,https://icanhazip.com,https://ifconfig.co/ip,https://ident.me
      - IP_CACHE_TTL=10m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - homedash-net

networks:
  homedash-net:
    driver: bridge
