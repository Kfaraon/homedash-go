<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Homedash — мониторинг домашних сервисов">
    <meta name="color-scheme" content="light dark">
    <title>homedash · services</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236c5ce7'/><text x='16' y='22' text-anchor='middle' font-size='18' font-family='system-ui' fill='white'>h</text></svg>">
    <link rel="preconnect" href="https://api.iconify.design" crossorigin>
    <link rel="stylesheet" href="/static/home.css">
    <style>
    html.dark-theme{--bg-primary:#0f0f0f;--bg-secondary:#1a1a1a;--bg-surface:#1a1a1a;--bg-elevated:#242424;--text-primary:#e5e5e5;--text-secondary:#a3a3a3;--text-muted:#666;--border-color:#2a2a2a;--border-hover:#404040;--accent:#8b7cf7;--accent-hover:#a78bfa;--accent-light:rgba(139,124,247,0.12);--success:#34d399;--success-bg:rgba(52,211,153,0.12);--danger:#f87171;--danger-bg:rgba(248,113,113,0.12);--shadow-sm:0 1px 2px rgba(0,0,0,0.2);--shadow-md:0 4px 12px rgba(0,0,0,0.3);--shadow-lg:0 8px 24px rgba(0,0,0,0.4)}
    </style>
    <script>
    if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark-theme');
    </script>
</head>
<body>
    <div class="container">

        <!-- ====== Header ====== -->
        <header class="header-row">
            <div class="repo-name">
                <h1>homedash <span>/ services</span></h1>
            </div>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему" title="Переключить тему">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1"/>
                </svg>
            </button>
        </header>

        <!-- ====== Service Groups ====== -->
        {{range .groups}}
        <section class="group-section">
            <div class="group-header">
                <h2>{{.Name}}</h2>
            </div>
            <div class="services-grid">
                {{range .Services}}
                <a class="service-card"
                   data-service-name="{{.Name}}"
                   {{if .URL}}href="{{.URL}}" target="_blank" rel="noopener"{{else}}href="#"{{end}}
                   aria-label="{{.Name}}">
                    <div class="card-header">
                        <div class="icon-bubble" style="background-color: {{resolveColor .Name}};">
                            <img class="service-icon-img"
                                 src="{{resolveIconCDN .Name .Icon}}"
                                 alt=""
                                 loading="lazy"
                                 decoding="async"
                                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22%3E%3Crect width=%2240%22 height=%2240%22 rx=%228%22 fill=%22%236c5ce7%22/%3E%3Ctext x=%2220%22 y=%2226%22 text-anchor=%22middle%22 font-size=%2218%22 font-family=%22system-ui%22 fill=%22white%22%3E%E2%9A%A1%3C/text%3E%3C/svg%3E'"
                            />
                        </div>
                        <span class="service-name">{{.Name}}</span>
                        <div class="status-icons">
                            {{if .URL}}
                            <span class="status-icon check-unknown"
                                  data-check-type="http"
                                  title="{{.URL}}">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                                    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2m-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.22.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93m6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39"/>
                                </svg>
                            </span>
                            {{end}}
                            {{if .IP}}
                            <span class="status-icon check-unknown"
                                  data-check-type="ping"
                                  title="{{.IP}}">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                                    <path fill="currentColor" d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2m0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8m-5.5-2.5 7.51-3.49L17.5 6.5 9.99 9.99 6.5 17.5m5.5-6.6 1.6 1.6.4-1.6 1.6-.4-1.6-.4-.4-1.6-1.6 1.6-1.6-.4.4 1.6"/>
                                </svg>
                            </span>
                            {{end}}
                        </div>
                    </div>
                </a>
                {{end}}
            </div>
        </section>
        {{end}}

        <!-- ====== Footer ====== -->
        <footer class="footer">
            <span>© homedash · adaptive monitoring</span>
        </footer>

    </div>

    <script>
    (() => {
        'use strict';

        /* ── Theme ── */
        const DARK_PATH = 'M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1';
        const LIGHT_PATH = 'M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1m18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1M11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1m0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1M5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58m12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06m1.06-12.37c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06M7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06';

        function setThemeIcon(dark) {
            const el = document.getElementById('themeIcon');
            if (el) el.querySelector('path').setAttribute('d', dark ? LIGHT_PATH : DARK_PATH);
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark-theme');
            document.body.classList.toggle('dark-theme');
            const dark = html.classList.contains('dark-theme');
            localStorage.setItem('theme', dark ? 'dark' : 'light');
            setThemeIcon(dark);
        }

        // Синхронизируем при загрузке
        const isDark = document.documentElement.classList.contains('dark-theme');
        if (isDark) document.body.classList.add('dark-theme');
        setThemeIcon(isDark);

        // Делегирование — гарантированная регистрация
        document.addEventListener('click', function(e) {
            const btn = e.target.closest('#themeToggle');
            if (btn) { e.preventDefault(); toggleTheme(); }
        });

        /* ── Adaptive polling с debounce ── */
        const BASE_POLL_MS = 5000;
        const MAX_POLL_MS = 30000;
        const MIN_POLL_MS = 2000;
        let currentPollMs = BASE_POLL_MS;
        let fetchErrorCount = 0;
        let consecutiveSuccess = 0;
        let pollTimer = null;

        async function fetchStatuses() {
            const startTime = performance.now();
            try {
                const res = await fetch('/api/status', { signal: AbortSignal.timeout(8000) });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                let anyOk = false, anyFail = false;

                Object.entries(data.services).forEach(([name, st]) => {
                    const card = document.querySelector(`.service-card[data-service-name="${name}"]`);
                    if (!card) return;

                    card.querySelectorAll('.status-icons > span').forEach(span => {
                        const type = span.dataset.checkType;
                        if (!type) return;
                        const val = st[type];
                        span.classList.remove('check-ok', 'check-fail', 'check-unknown');
                        if (val === true)       { span.classList.add('check-ok');   anyOk = true; }
                        else if (val === false) { span.classList.add('check-fail'); anyFail = true; }
                        else                    { span.classList.add('check-unknown'); }
                    });
                });

                fetchErrorCount = 0;
                consecutiveSuccess++;

                // Adaptive polling: уменьшаем интервал при успехах
                if (consecutiveSuccess > 3 && currentPollMs > MIN_POLL_MS) {
                    currentPollMs = Math.max(MIN_POLL_MS, currentPollMs - 500);
                }

                const duration = performance.now() - startTime;
                console.debug(`[homedash] fetch ok (${duration.toFixed(0)}ms, next in ${(currentPollMs/1000).toFixed(1)}s)`);

            } catch (err) {
                console.warn('[homedash] fetch error:', err);
                fetchErrorCount++;
                consecutiveSuccess = 0;

                // Adaptive backoff: увеличиваем интервал при ошибках
                if (fetchErrorCount > 2) {
                    currentPollMs = Math.min(MAX_POLL_MS, currentPollMs * 1.5);
                }
            }

            // Schedule next poll with adaptive delay
            pollTimer = setTimeout(fetchStatuses, currentPollMs);
        }

        // Start polling
        fetchStatuses();

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (pollTimer) clearTimeout(pollTimer);
        });
    })();
    </script>
</body>
</html>
