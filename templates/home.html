<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homedash · сервисы</title>
    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.3.0/dist/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="repo-info">
                <div class="repo-name">
                    <h1>homedash/services</h1>
                    <span class="repo-badge">public</span>
                </div>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <iconify-icon id="themeIcon" icon="material-symbols:dark-mode-outline" width="20" height="20"></iconify-icon>
            </div>
        </div>

        {{range .groups}}
        <div class="group-section">
            <div class="group-header">
                <h2>{{.Name}}</h2>
            </div>
            <div class="services-grid">
                {{range .Services}}
                <div class="service-card" data-service-name="{{.Name}}" data-url="{{.URL}}">
                    <div class="card-header">
                        <iconify-icon icon="{{.Icon}}" width="24" height="24"></iconify-icon>
                        <span class="service-name">{{.Name}}</span>
                        <div class="status-icons">
                            {{if .URL}}
                            <iconify-icon
                                icon="mdi:web"
                                width="18"
                                height="18"
                                class="status-icon check-unknown"
                                data-check-type="http"
                                title="{{.URL}}"
                            ></iconify-icon>
                            {{end}}
                            {{if .IP}}
                            <iconify-icon
                                icon="mdi:network"
                                width="18"
                                height="18"
                                class="status-icon check-unknown"
                                data-check-type="ping"
                                title="{{.IP}}"
                            ></iconify-icon>
                            {{end}}
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="service-category">{{.Category | lower}}.yaml</div>
                    </div>
                </div>
                {{end}}
            </div>
        </div>
        {{end}}

        <div class="footer">
            <span>© homedash · auto-update every 5s</span>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;

        function updateThemeIcon() {
            if (body.classList.contains('dark-theme')) {
                themeIcon.setAttribute('icon', 'material-symbols:light-mode-outline');
            } else {
                themeIcon.setAttribute('icon', 'material-symbols:dark-mode-outline');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark-theme');
            updateThemeIcon();
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-theme');
            localStorage.setItem('theme', body.classList.contains('dark-theme') ? 'dark' : 'light');
            updateThemeIcon();
        });

        document.querySelectorAll('.service-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const url = card.dataset.url;
                if (url && url !== '#') {
                    window.open(url, '_blank');
                }
            });
        });

        async function fetchStatuses() {
            try {
                const response = await fetch('/api/status');
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                const data = await response.json();

                Object.entries(data.services).forEach(([name, status]) => {
                    const card = document.querySelector(`.service-card[data-service-name="${name}"]`);
                    if (!card) return;

                    const icons = card.querySelectorAll('.status-icons iconify-icon');
                    icons.forEach(icon => {
                        const checkType = icon.getAttribute('data-check-type');
                        if (!checkType) return;
                        const val = status[checkType];
                        icon.classList.remove('check-ok', 'check-fail', 'check-unknown');
                        if (val === true) icon.classList.add('check-ok');
                        else if (val === false) icon.classList.add('check-fail');
                        else icon.classList.add('check-unknown');
                    });
                });
            } catch (error) {
                console.error('Ошибка при обновлении статусов:', error);
            }
        }

        fetchStatuses();
        setInterval(fetchStatuses, 5000);
    </script>
</body>
</html>
