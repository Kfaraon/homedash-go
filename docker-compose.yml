services:
  homedash:
    build: .
    container_name: homedash
    env_file: .env
    ports:
      - "${HOMEDASH_PORT:-5000}:5000"
    volumes:
      - ./data:/app/data
    environment:
      - MAX_WORKERS=${MAX_WORKERS:-20}
      - USE_LRU_CACHE=${USE_LRU_CACHE:-false}
      - LRU_CACHE_CAPACITY=${LRU_CACHE_CAPACITY:-1000}
      - LRU_CACHE_TTL=${LRU_CACHE_TTL:-5m}
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-5m}
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'
    networks:
      - homedash-net

networks:
  homedash-net:
    driver: bridge